kind = "web"
previewPath = "/"
title = "Telecurso de IAs"
version = "1.0.0"
id = "artifacts/telecurso-ia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19747

[services.development]
run = "pnpm --filter @workspace/telecurso-ia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/telecurso-ia", "run", "build" ]
publicDir = "artifacts/telecurso-ia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19747"
BASE_PATH = "/"
